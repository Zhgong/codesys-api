[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
markers = [
    "mock: tests that exercise the mock HTTP server without a CODESYS installation",
    "codesys: tests that require a real CODESYS installation",
    "codesys_main: fast real-CODESYS acceptance path that minimizes cold starts",
    "codesys_slow: slower real-CODESYS runtime hardening checks",
]

[tool.mypy]
python_version = "3.14"
strict = true
warn_unused_configs = true
mypy_path = ["src"]
files = [
    "_repo_bootstrap.py",
    "src/codesys_api",
    "codesys_cli.py",
    "HTTP_SERVER.py",
    "test_server.py",
    "scripts/run_baseline.py",
    "tests/integration",
    "tests/unit",
    "tests/e2e/codesys",
    "tests/e2e/mock",
]

[[tool.mypy.overrides]]
module = [
    "HTTP_SERVER",
    "PERSISTENT_SESSION",
    "test_server",
]
ignore_errors = true
