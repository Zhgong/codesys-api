name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install project and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build mypy pytest

      - name: Run baseline
        run: python scripts\run_baseline.py

      - name: Build release artifacts
        run: python scripts\build_release.py

      - name: Run public release gate
        run: python scripts\check_public_release.py

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/*

      - name: Publish workflow summary
        shell: pwsh
        run: |
          $version = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"$').Matches[0].Groups[1].Value
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Release Build"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Version: $version"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Commit: $env:GITHUB_SHA"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Artifacts:"
          Get-ChildItem dist | ForEach-Object {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "  - $($_.Name)"
          }
