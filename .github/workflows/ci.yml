name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  baseline:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build mypy pytest

      - name: Run baseline
        run: python scripts\run_baseline.py

      - name: Build release artifacts
        run: python scripts\build_release.py

      - name: Run public release gate
        run: python scripts\check_public_release.py

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/*
