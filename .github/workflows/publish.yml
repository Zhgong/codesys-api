name: Publish Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        type: choice
        options:
          - testpypi
          - pypi


jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.set.outputs.target }}
    steps:
      - name: Resolve publish target
        id: set
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "target=testpypi" >> "$GITHUB_OUTPUT"
          else
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-target
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install project and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build mypy pytest twine

      - name: Run baseline
        run: python scripts\run_baseline.py

      - name: Build release artifacts
        run: python scripts\build_release.py

      - name: Run public release gate
        run: python scripts\check_public_release.py

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/*

  publish:
    needs: [resolve-target, build]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-target.outputs.target }}
    permissions:
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist

      - name: Publish to TestPyPI
        if: needs.resolve-target.outputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

      - name: Publish to PyPI
        if: needs.resolve-target.outputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
